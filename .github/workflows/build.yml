name: Build

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - run: bun install && bun run build
    - uses: actions/upload-pages-artifact@v4
      with:
        path: dist
